{% extends 'myMovieReviews/base.html' %}
{% block content %}
<div class='list-container'>
    {% for review in reviews %}
    <div class="card reviews">
        <div class="list-movie-data">
            <h2 class="list-movie-title">
                <a href="{% url 'reviews-detail' review.pk %}">{{ review.title }}</a>
            </h2>
            <p class="list-movie-title">개봉년도: {{ review.release_date }}</p>
            <p class="list-movie-genre">장르: {{ review.genre }}</p>
            <p class="list-movie-rating">별점: {{ review.rating }}</p>
        </div>
    </div>
    {% endfor %}
</div>

{% endblock %}
