{% extends 'myMovieReviews/base.html' %}
{% block content %}
<div class='delete-container'>
    <h1>정말 삭제하시겠습니까?</h1>
    <p>"{{ review.title }}"을(를) 삭제합니다.</p>

    <form method="POST">
        {% csrf_token %}
        <button type="submit" class="btn btn-delete">삭제</button>
        <a href="{% url 'reviews-detail' review.pk %}" class="btn btn-back">취소</a>
    </form>
</div>

{% endblock %}
