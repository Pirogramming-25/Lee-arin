{% extends "base.html" %}
{% block content %}
<div class="auth-box">
  <h2>{% if post %}게시글 수정{% else %}새 게시글{% endif %}</h2>
  <form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn-primary">{% if post %}수정{% else %}공유{% endif %}</button>
  </form>
</div>
{% endblock %}
